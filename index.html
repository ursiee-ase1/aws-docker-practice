<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ursiee's Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background-color: #ffffff;
      color: #2b1d0e;
    }

    /* NAV */
    nav {
      background-color: #ffffff;
      border-bottom: 2px solid #c8873a;
      padding: 16px 40px;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: #2b1d0e;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #c8873a;
    }

    /* HERO */
    h1 {
      text-align: center;
      padding: 48px 40px 8px;
      font-size: 2rem;
      color: #2b1d0e;
      letter-spacing: 0.06em;
    }

    h1 span {
      color: #c8873a;
    }

    /* DESCRIPTION */
    #description {
      max-width: 680px;
      margin: 32px auto;
      padding: 28px 32px;
      border-left: 3px solid #c8873a;
      background-color: #fdf8f3;
    }

    #description h2 {
      font-size: 1.2rem;
      margin-bottom: 12px;
      color: #2b1d0e;
    }

    #description p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #4a3728;
    }

    /* AREAS LIST */
    #Areas {
      max-width: 680px;
      margin: 0 auto 40px;
      padding: 0 32px;
      list-style: none;
    }

    #Areas li {
      padding: 10px 0;
      border-bottom: 1px solid #e8d5be;
      font-size: 0.95rem;
      color: #4a3728;
    }

    #Areas li::before {
      content: "— ";
      color: #c8873a;
    }

    /* FORM SECTION */
    #form {
      max-width: 680px;
      margin: 0 auto 60px;
      padding: 32px;
      background-color: #fdf8f3;
      border-top: 2px solid #c8873a;
    }

    #form h3 {
      font-size: 1.1rem;
      margin-bottom: 24px;
      color: #2b1d0e;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #4a3728;
      letter-spacing: 0.03em;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 20px;
      border: 1px solid #d4b896;
      background-color: #ffffff;
      color: #2b1d0e;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    textarea:focus {
      border-color: #c8873a;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    button[type="submit"] {
      background-color: #c8873a;
      color: #ffffff;
      border: none;
      padding: 12px 32px;
      font-size: 0.9rem;
      font-family: Georgia, serif;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button[type="submit"]:hover {
      background-color: #a86e2a;
    }
  </style>
</head>
<body>

  <h1>Ursiee's <span>Portfolio</span></h1>

  <nav>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div id="description">
    <h2>Welcome to Ursula's Portfolio Website</h2>
    <p>This is a documentation of Ursula's real world impact projects spanning various sectors.</p>
  </div>

  <ul id="Areas">
    <li>Cloud Computing</li>
    <li>Data Analytics</li>
  </ul>

  <div id="form">
    <h3>Contact</h3>
    <form id="contact-form">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Type your first name">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Input password">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Type email">

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Type your message"></textarea>
      <button type="submit">Submit</button>

    </form>
  </div>

</body>
</html>
